name: CodeQL

# Static analysis (SAST) for Rust via CodeQL — results land in the Security tab
# (Code scanning). The `main` ruleset makes CodeQL a REQUIRED code-scanning tool,
# so coverage must survive the "stuck PR" class: the `push` trigger binds a result
# to each branch's STABLE head SHA (GitHub maps it onto open PRs and honours it
# across base moves that recompute the merge ref), while `pull_request` adds the
# merge-ref, PR-diff-aware analysis. Analysing every branch head — not just main —
# is what keeps a PR off mergeStateStatus=BLOCKED after an unrelated merge moves
# main. CodeQL uploads via the built-in GITHUB_TOKEN (App tokens are rejected by
# upload-sarif, github/codeql-action#2719).
#
# NOTE: action refs are pinned to full commit SHAs (the repo's Actions policy
# requires it; also satisfies Scorecard Pinned-Dependencies); Renovate keeps them current.

on:
  push:
    branches: ["**"] # every branch head; feature-branch heads cure the required-CodeQL stuck-PR class
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 6 * * 1"

permissions:
  contents: read

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: analyze (rust)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      security-events: write # upload results to code scanning
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      # Cache the workspace build like ci.yml does — build-mode: manual compiles the
      # whole workspace under the tracer, and an uncached cold build would otherwise
      # risk eating the timeout before analysis. Safe here (SAST, not artifact-
      # publishing), unlike the deliberately-uncached release.yml.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: codeql
      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          languages: rust
          # `build-mode: none` did source-only extraction that couldn't resolve
          # dependency types — 19/20 files came back "extracted with errors", so the
          # SAST was effectively empty. `manual` traces a real cargo build so CodeQL
          # sees the whole workspace with deps resolved.
          build-mode: manual
      - name: Build under the CodeQL tracer
        run: cargo build --workspace --all-targets --locked
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4
        with:
          category: "/language:rust"

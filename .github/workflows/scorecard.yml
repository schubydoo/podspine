name: Scorecard

# OpenSSF Scorecard — repository-level security best-practices audit. Runs on
# branch_protection_rule (so ruleset changes trigger a re-evaluation), a weekly
# schedule, and pushes to main. Intentionally NOT a required check: it never runs
# on pull_request, so requiring it would leave every PR perpetually pending. The
# signal lives in the Security tab (Code scanning → Scorecard) and at
# scorecard.dev once publish_results is enabled.
#
# NOTE: action refs are version tags for readability; a Renovate digest-pinning
# rule (renovate.json) converts them to commit SHAs to satisfy Scorecard's
# Pinned-Dependencies check and keeps them updated.

on:
  branch_protection_rule:
  schedule:
    - cron: "18 7 * * 1"
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      security-events: write # upload the SARIF to code scanning
      id-token: write # publish results to the public Scorecard API
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@v2
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: scorecard

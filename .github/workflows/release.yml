name: Release

# Cut a release by pushing a tag: `git tag v1.0.0 && git push origin v1.0.0`.
# This builds static musl binaries for amd64 + arm64, attaches them (with
# checksums) to a GitHub Release, and pushes a multi-arch image to GHCR. TAD §6.4.
on:
  push:
    tags: ['v*']

permissions:
  contents: write # create the release + upload binary assets
  packages: write # push the image to GHCR

env:
  CARGO_TERM_COLOR: always

jobs:
  binaries:
    name: Build static ${{ matrix.arch }} binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      # cargo-zigbuild uses zig as the cross linker, so both musl targets build
      # from an x86_64 runner (incl. rusqlite's bundled SQLite C). Simpler and
      # more uniform than mixing musl-tools + a separate arm64 toolchain.
      - uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        run: cargo install cargo-zigbuild --locked
      - name: Build
        run: cargo zigbuild --release --target ${{ matrix.target }} --bin podspine
      - name: Stage artifact + checksum
        run: |
          mkdir -p "dist/${{ matrix.arch }}"
          cp "target/${{ matrix.target }}/release/podspine" "dist/${{ matrix.arch }}/podspine"
          cp "dist/${{ matrix.arch }}/podspine" "podspine-${{ github.ref_name }}-linux-${{ matrix.arch }}"
          sha256sum "podspine-${{ github.ref_name }}-linux-${{ matrix.arch }}" \
            > "podspine-${{ github.ref_name }}-linux-${{ matrix.arch }}.sha256"
      # Pass the binary to the image job (matches the Dockerfile's dist/<arch>/).
      - name: Upload binary for the image build
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.arch }}
          path: dist/${{ matrix.arch }}/podspine
          retention-days: 1
      - name: Attach to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            podspine-${{ github.ref_name }}-linux-${{ matrix.arch }}
            podspine-${{ github.ref_name }}-linux-${{ matrix.arch }}.sha256

  image:
    name: Multi-arch image → GHCR
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Lay out dist/ for the Dockerfile
        run: |
          mkdir -p dist/amd64 dist/arm64
          cp artifacts/dist-amd64/podspine dist/amd64/podspine
          cp artifacts/dist-arm64/podspine dist/arm64/podspine
          chmod +x dist/amd64/podspine dist/arm64/podspine
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

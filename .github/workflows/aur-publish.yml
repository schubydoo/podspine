name: AUR publish

# Push the AUR podspine-bin package (packaging/aur/{PKGBUILD,.SRCINFO}) to the AUR when a
# packaging-bump PR merges — at which point main carries the bumped, checksum-verified
# manifests. Best-effort and gated on the AUR_SSH_KEY secret, so a repo without AUR set up
# (or a fork) simply skips it. Requires: an AUR account whose SSH public key is registered
# at aur.archlinux.org, with the matching PRIVATE key stored as the AUR_SSH_KEY secret.
on:
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aur-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Push podspine-bin to the AUR
    # Merged packaging-bump PR from this repo (not a fork), or a manual dispatch.
    if: >-
      github.event_name == 'workflow_dispatch'
      || (github.event.pull_request.merged == true
          && github.event.pull_request.head.repo.full_name == github.repository
          && startsWith(github.head_ref, 'packaging-bump/'))
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Skip if AUR isn't configured
        id: gate
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          if [ -z "${AUR_SSH_KEY:-}" ]; then
            echo "::notice::AUR_SSH_KEY not set — skipping AUR publish."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to the AUR
        if: ${{ steps.gate.outputs.configured == 'true' }}
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_KEY" > ~/.ssh/aur
          chmod 600 ~/.ssh/aur
          # Host-key pinning is a hardening option; ssh-keyscan is the common, reliable
          # choice for the AUR's public git host.
          ssh-keyscan -t ed25519,rsa aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/aur -o IdentitiesOnly=yes"

          git config --global user.name "podspine-ci"
          git config --global user.email "podspine-ci@users.noreply.github.com"

          work="$(mktemp -d)"
          repo="ssh://aur@aur.archlinux.org/podspine-bin.git"
          # First publish: the package may not exist yet — fall back to an empty repo.
          if ! git clone "$repo" "$work/aur" 2>/dev/null; then
            git -C "$work" init -q aur
            git -C "$work/aur" remote add origin "$repo"
          fi

          cp packaging/aur/PKGBUILD packaging/aur/.SRCINFO "$work/aur/"
          cd "$work/aur"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR already up to date — nothing to push."
            exit 0
          fi
          ver="$(sed -n 's/^pkgver=//p' PKGBUILD | head -1)"
          git commit -q -m "Update to ${ver:-latest}"
          git push origin HEAD:master
          echo "Published podspine-bin ${ver:-} to the AUR."

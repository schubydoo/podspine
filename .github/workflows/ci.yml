name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Format
        run: cargo fmt --all --check
      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --workspace --all-features

  supply-chain:
    name: audit · deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install cargo-audit and cargo-deny
        run: cargo install cargo-audit cargo-deny --locked
      - name: Audit
        run: cargo audit
      - name: Deny
        run: cargo deny check

  coverage:
    name: coverage (>= 90% lines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      # Enforce the line floor (the real gate; baseline ~91%) and emit lcov.
      # cargo-llvm-cov writes lcov.info before the threshold check, so the upload
      # below still runs on a floor failure — surfacing a drop when it matters.
      - name: Coverage (lcov + line floor)
        run: cargo llvm-cov --workspace --lcov --output-path lcov.info --fail-under-lines 90
      # Codecov is informational (PR comment + trends + per-crate breakdown, see
      # codecov.yml); tokenless for public repos, never fails CI on upload hiccups.
      - name: Upload to Codecov
        if: ${{ !cancelled() }}
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false

site_name: Podspine
site_description: Turn your audiobook files into per-chapter podcast feeds any podcast app can play.
site_url: https://schubydoo.github.io/podspine/
site_author: schubydoo
copyright: AGPL-3.0-only

repo_url: https://github.com/schubydoo/podspine
repo_name: schubydoo/podspine
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  icon:
    repo: fontawesome/brands/github
  features:
    - navigation.top
    - navigation.sections
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - search.suggest
    - search.highlight
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

plugins:
  - search
  - include-markdown

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  # `:material-*:` / `:fontawesome-*:` icon shortcodes -> inline SVGs.
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        # Render ```mermaid fenced blocks client-side (Material bundles mermaid.js).
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra:
  version:
    # Version selector is driven by `mike` (see .github/workflows/docs.yml).
    provider: mike
    default: latest

nav:
  - Home: index.md
  - Deploying: DEPLOYMENT.md
  - Adding to your app: importing.md
  - Architecture: ARCHITECTURE.md
  - Development: DEVELOPMENT.md
  - Benchmarks: benchmarks.md
  - Changelog: changelog.md
  # Governance docs stay canonical on GitHub:
  - Contributing: https://github.com/schubydoo/podspine/blob/main/CONTRIBUTING.md
  - Security: https://github.com/schubydoo/podspine/blob/main/SECURITY.md
